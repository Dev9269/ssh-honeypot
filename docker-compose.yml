version: '3.8'

services:
  honeypot:
    build: .
    container_name: ssh-honeypot
    ports:
      - "2222:2222"
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./sftp_root:/app/sftp_root
      - ./honeypot.yaml:/app/honeypot.yaml
    environment:
      - TZ=UTC
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - honeypot-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 2222))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

networks:
  honeypot-net:
    driver: bridge
